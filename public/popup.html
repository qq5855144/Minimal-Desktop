<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>剪藏到桌面</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        width: 300px;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
        background: #1c1c1e;
        color: #fff;
        border-radius: 12px;
        overflow: hidden;
      }
      #main { padding: 16px; }
      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }
      #favicon {
        width: 32px; height: 32px;
        border-radius: 8px;
        object-fit: cover;
        display: none;
        background: #2c2c2e;
        flex-shrink: 0;
      }
      .favicon-placeholder {
        width: 32px; height: 32px;
        border-radius: 8px;
        background: linear-gradient(135deg, #636366 0%, #3a3a3c 100%);
        flex-shrink: 0;
        display: flex; align-items: center; justify-content: center;
        font-size: 16px;
      }
      .page-info { flex: 1; min-width: 0; }
      #title {
        font-size: 13px;
        font-weight: 600;
        color: #fff;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      #url {
        font-size: 11px;
        color: #8e8e93;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-top: 2px;
      }
      .divider {
        height: 1px;
        background: #3a3a3c;
        margin-bottom: 12px;
      }
      #add-btn {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 10px;
        background: #0a84ff;
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity .15s;
        font-family: inherit;
      }
      #add-btn:hover:not(:disabled) { opacity: .88; }
      #add-btn:disabled { opacity: .45; cursor: default; }
      /* 成功状态 */
      #status {
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 28px 16px;
        gap: 8px;
      }
      .check-icon {
        width: 44px; height: 44px;
        background: #30d158;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 22px;
      }
      .success-text {
        font-size: 14px;
        font-weight: 600;
        color: #fff;
      }
      .success-hint {
        font-size: 12px;
        color: #8e8e93;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="main">
      <div class="header">
        <img id="favicon" alt="" />
        <div class="favicon-placeholder" id="favicon-ph">🌐</div>
        <div class="page-info">
          <div id="title">正在读取页面…</div>
          <div id="url"></div>
        </div>
      </div>
      <div class="divider"></div>
      <button id="add-btn">📌 添加到桌面</button>
    </div>
    <div id="status">
      <div class="check-icon">✓</div>
      <div class="success-text">已剪藏到桌面</div>
      <div class="success-hint">打开新标签页即可添加</div>
    </div>
    <script src="./assets/popup.js" type="module"></script>
  </body>
</html>
