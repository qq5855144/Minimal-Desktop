<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>剪藏到桌面</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        width: 320px;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
        background: #1c1c1e;
        color: #f5f5f7;
        -webkit-font-smoothing: antialiased;
      }

      /* ── 顶部标题栏 ─────────────────────── */
      .topbar {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 14px 16px 0;
      }
      .topbar-icon {
        width: 20px; height: 20px;
        color: #0a84ff;
        flex-shrink: 0;
      }
      .topbar-title {
        font-size: 13px;
        font-weight: 600;
        color: #ebebf5cc;
        letter-spacing: .01em;
      }

      /* ── 页面预览卡片 ─────────────────────── */
      #main { padding: 12px 16px 16px; }

      .page-card {
        display: flex;
        align-items: center;
        gap: 12px;
        background: #2c2c2e;
        border-radius: 12px;
        padding: 12px;
        margin-bottom: 12px;
      }

      .favicon-wrap {
        position: relative;
        width: 40px; height: 40px;
        flex-shrink: 0;
      }
      #favicon {
        width: 40px; height: 40px;
        border-radius: 10px;
        object-fit: cover;
        display: none;
      }
      .favicon-fallback {
        width: 40px; height: 40px;
        border-radius: 10px;
        background: linear-gradient(135deg, #48484a 0%, #3a3a3c 100%);
        display: flex; align-items: center; justify-content: center;
      }
      .favicon-fallback svg { width: 20px; height: 20px; color: #636366; }

      .page-info { flex: 1; min-width: 0; }
      #title {
        font-size: 13px;
        font-weight: 600;
        color: #f5f5f7;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1.3;
      }
      #url {
        font-size: 11px;
        color: #8e8e93;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-top: 3px;
        line-height: 1.3;
      }

      /* ── 按钮 ─────────────────────── */
      #add-btn {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 11px;
        border: none;
        border-radius: 11px;
        background: #0a84ff;
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity .12s, transform .1s;
        font-family: inherit;
        letter-spacing: .01em;
      }
      #add-btn svg { width: 15px; height: 15px; flex-shrink: 0; }
      #add-btn:hover:not(:disabled) { opacity: .88; }
      #add-btn:active:not(:disabled) { transform: scale(.98); }
      #add-btn:disabled { opacity: .4; cursor: default; }

      /* ── 成功状态 ─────────────────────── */
      #status {
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 32px 16px 28px;
        gap: 10px;
      }
      .check-ring {
        width: 48px; height: 48px;
        border-radius: 50%;
        background: rgba(48, 209, 88, .15);
        border: 1.5px solid rgba(48, 209, 88, .4);
        display: flex; align-items: center; justify-content: center;
      }
      .check-ring svg { width: 22px; height: 22px; color: #30d158; }
      .success-text {
        font-size: 14px; font-weight: 600; color: #f5f5f7;
      }
      .success-hint {
        font-size: 12px; color: #636366; text-align: center; line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <!-- 顶部标题栏 -->
    <div class="topbar">
      <svg class="topbar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      <span class="topbar-title">剪藏到桌面</span>
    </div>

    <!-- 主内容 -->
    <div id="main">
      <!-- 页面预览卡 -->
      <div class="page-card">
        <div class="favicon-wrap">
          <img id="favicon" alt="" />
          <div class="favicon-fallback" id="favicon-ph">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="2" y1="12" x2="22" y2="12"/>
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
          </div>
        </div>
        <div class="page-info">
          <div id="title">正在读取页面…</div>
          <div id="url"></div>
        </div>
      </div>

      <!-- 添加按钮 -->
      <button id="add-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
        </svg>
        添加到桌面
      </button>
    </div>

    <!-- 成功状态 -->
    <div id="status">
      <div class="check-ring">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <div class="success-text">已添加到桌面</div>
      <div class="success-hint">新标签页打开后<br>将弹出确认对话框</div>
    </div>

    <script src="./assets/popup.js" type="module"></script>
  </body>
</html>
